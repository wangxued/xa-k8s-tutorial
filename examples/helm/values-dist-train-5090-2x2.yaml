# 2 节点 × 2 卡 RTX 5090 分布式训练（共 4 卡，适合 namespace quota 较紧时起步）
NameSpace: your-namespace
BaseName: dist-5090-2x2
ContainerImage: harbor.xa.hqzyai.com:19443/llm-course/lab:v2
GPU: "5090"

Limits:
  CPU: "8"
  memory: 32Gi
  GPU: 2

Distributed:
  nodes: 2
  masterPort: 29500
  trainScript: /workspace/train.py

HeadlessService:
  enabled: true

UseShm: true
ShmSize: 8Gi

Workspace:
  enabled: true
  create: true
  storageClassName: h3c-csi-sc-nfs
  size: 50Gi
  mountPath: /workspace

# Job 完成后 24h 自动删除 Job/Pod（释放 GPU）；checkpoint 请写入 /workspace
ttlSecondsAfterFinished: 86400

# 排除仅 6 卡可调的 yw-gpu-18（若每 Pod 申请 8 卡时更需排除）
Affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: NotIn
              values:
                - yw-gpu-18
