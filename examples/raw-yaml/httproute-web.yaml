apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-workload-web
  namespace: your-namespace
spec:
  parentRefs:
    - name: yunwang-public
      namespace: envoy-gateway-system
      sectionName: https-wildcard-8443
  hostnames:
    - demo.xa.hqzyai.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ai-workload-web
          port: 7860
