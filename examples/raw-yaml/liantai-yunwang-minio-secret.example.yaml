# 云网 data-export MinIO 凭据 Secret（联泰侧 Pod 使用）
# 部署前须改动的字段见 docs/data-export-minio-usage.md §5 表格。
# 勿将含真实 AK/SK 的文件提交至 Git。
---
apiVersion: v1
kind: Secret
metadata:
  name: yunwang-data-export-minio
  namespace: changcan22
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "<云网 data-export-user access key>"
  AWS_SECRET_ACCESS_KEY: "<云网 data-export-user secret key>"
