# 多机多卡训练 — 2 台 H200，每台 8 卡（共 16 卡）
#
# 说明：docs/multinode-gpu-training.md
# 部署前请替换 namespace、镜像、train.py 路径。
---
apiVersion: v1
kind: Service
metadata:
  name: dist-train-h200
  namespace: your-namespace
  labels:
    app: dist-train-h200
spec:
  clusterIP: None
  selector:
    job-name: dist-train-h200
  ports:
    - name: nccl
      port: 29500
      targetPort: 29500
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dist-train-h200-data
  namespace: your-namespace
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: h3c-csi-sc-epc
  resources:
    requests:
      storage: 500Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: dist-train-h200
  namespace: your-namespace
  labels:
    app: dist-train-h200
spec:
  completionMode: Indexed
  completions: 2
  parallelism: 2
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: dist-train-h200
    spec:
      subdomain: dist-train-h200
      restartPolicy: Never
      nodeSelector:
        gpu-type: H200
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - dist-train-h200
              topologyKey: kubernetes.io/hostname
      containers:
        - name: trainer
          image: harbor.xa.hqzyai.com:19443/llm-course/lab:v2
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: "32"
              memory: 128Gi
              nvidia.com/gpu: "8"
            limits:
              cpu: "64"
              memory: 256Gi
              nvidia.com/gpu: "8"
          ports:
            - containerPort: 29500
              name: nccl
          env:
            - name: NNODES
              value: "2"
            - name: NPROC_PER_NODE
              value: "8"
            - name: MASTER_PORT
              value: "29500"
            - name: MASTER_ADDR
              value: dist-train-h200-0.dist-train-h200
          volumeMounts:
            - name: train-data
              mountPath: /workspace
            - name: dshm
              mountPath: /dev/shm
          command:
            - /bin/bash
            - -ec
            - |
              node_rank="${JOB_COMPLETION_INDEX:-0}"
              exec torchrun \
                --nnodes="${NNODES}" \
                --nproc_per_node="${NPROC_PER_NODE}" \
                --node_rank="${node_rank}" \
                --master_addr="${MASTER_ADDR}" \
                --master_port="${MASTER_PORT}" \
                /workspace/train.py
      volumes:
        - name: train-data
          persistentVolumeClaim:
            claimName: dist-train-h200-data
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
