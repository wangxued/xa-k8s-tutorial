{{- $gpuType := toString (.Values.GPU | default "") -}}
{{- $gpuCount := int (.Values.Limits.GPU | default 0) -}}
{{- $nodes := int (.Values.Distributed.nodes | default 2) -}}
{{- if and (eq $gpuType "5090") .Values.Workspace.create (eq .Values.Workspace.storageClassName "h3c-csi-sc-epc") -}}
{{- fail "5090 nodes only support h3c-csi-sc-nfs. Change Workspace.storageClassName to h3c-csi-sc-nfs." -}}
{{- end -}}
{{- if and .Values.Workspace.enabled (not .Values.Workspace.create) (not .Values.Workspace.claimName) -}}
{{- fail "Workspace.claimName is required when Workspace.create is false." -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "xay-ai-dist-train.fullname" . }}
  namespace: {{ include "xay-ai-dist-train.namespace" . }}
  labels:
{{ include "xay-ai-dist-train.labels" . | nindent 4 }}
spec:
  completionMode: Indexed
  completions: {{ $nodes }}
  parallelism: {{ $nodes }}
  backoffLimit: {{ .Values.backoffLimit | default 0 }}
  ttlSecondsAfterFinished: {{ .Values.ttlSecondsAfterFinished | default 86400 }}
  template:
    metadata:
      labels:
{{ include "xay-ai-dist-train.selectorLabels" . | nindent 8 }}
    spec:
{{- if .Values.HeadlessService.enabled }}
      subdomain: {{ include "xay-ai-dist-train.fullname" . }}
{{- end }}
      restartPolicy: Never
      securityContext:
        runAsUser: {{ .Values.UID | default 0 }}
        runAsGroup: {{ .Values.GID | default 0 }}
{{- if or (and $gpuType (ne (lower $gpuType) "none") (gt $gpuCount 0)) .Values.NodeSelector }}
      nodeSelector:
{{- if and $gpuType (ne (lower $gpuType) "none") (gt $gpuCount 0) }}
        gpu-type: {{ $gpuType | quote }}
{{- end }}
{{- with .Values.NodeSelector }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- end }}
      tolerations:
{{- if gt $gpuCount 0 }}
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
{{- end }}
{{- with .Values.Tolerations }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- if or .Values.Distributed.spreadAcrossNodes .Values.Affinity }}
      affinity:
{{- if .Values.Distributed.spreadAcrossNodes }}
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
{{ include "xay-ai-dist-train.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
{{- end }}
{{- with .Values.Affinity }}
{{ toYaml . | nindent 8 }}
{{- end }}
{{- end }}
      containers:
        - name: {{ include "xay-ai-dist-train.containerName" . }}
          image: {{ .Values.ContainerImage | quote }}
          imagePullPolicy: {{ .Values.ImagePullPolicy | default "IfNotPresent" }}
          ports:
            - name: nccl
              containerPort: {{ .Values.Distributed.masterPort | default 29500 }}
              protocol: TCP
          env:
            - name: NNODES
              value: {{ $nodes | quote }}
            - name: NPROC_PER_NODE
              value: {{ $gpuCount | quote }}
            - name: MASTER_PORT
              value: {{ .Values.Distributed.masterPort | default 29500 | quote }}
            - name: MASTER_ADDR
              value: {{ include "xay-ai-dist-train.masterAddr" . | quote }}
{{- with .Values.ExtraEnv }}
{{ toYaml . | nindent 12 }}
{{- end }}
{{- if .Values.Command }}
          command: {{ .Values.Command }}
{{- if .Values.Args }}
          args: {{ .Values.Args }}
{{- end }}
{{- else }}
          command:
            - /bin/bash
            - -ec
            - |
              node_rank="${JOB_COMPLETION_INDEX:-0}"
              echo "NODE_RANK=${node_rank} MASTER_ADDR=${MASTER_ADDR} NNODES=${NNODES}"
              exec torchrun \
                --nnodes="${NNODES}" \
                --nproc_per_node="${NPROC_PER_NODE}" \
                --node_rank="${node_rank}" \
                --master_addr="${MASTER_ADDR}" \
                --master_port="${MASTER_PORT}" \
                {{ .Values.Distributed.trainScript | default "/workspace/train.py" | quote }}
{{- end }}
          resources:
            limits:
              cpu: {{ .Values.Limits.CPU | quote }}
              memory: {{ .Values.Limits.memory | quote }}
{{- if gt $gpuCount 0 }}
              nvidia.com/gpu: {{ $gpuCount }}
{{- end }}
            requests:
              cpu: {{ .Values.Limits.CPU | quote }}
              memory: {{ .Values.Limits.memory | quote }}
{{- if gt $gpuCount 0 }}
              nvidia.com/gpu: {{ $gpuCount }}
{{- end }}
          volumeMounts:
{{- if .Values.Workspace.enabled }}
            - name: workspace
              mountPath: {{ .Values.Workspace.mountPath | default "/workspace" }}
              readOnly: {{ .Values.Workspace.readOnly | default false }}
{{- end }}
{{- if .Values.UseShm }}
            - name: dshm
              mountPath: /dev/shm
{{- end }}
{{- with .Values.ExtraVolumeMounts }}
{{ toYaml . | nindent 12 }}
{{- end }}
      volumes:
{{- if .Values.Workspace.enabled }}
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "xay-ai-dist-train.workspaceClaimName" . }}
{{- end }}
{{- if .Values.UseShm }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.ShmSize | default "16Gi" }}
{{- end }}
{{- with .Values.ExtraVolumes }}
{{ toYaml . | nindent 8 }}
{{- end }}
